# Research Project Configuration
# 모든 경로와 실험 파라미터는 이 파일에서 관리합니다.
# 코드 내 하드코딩 절대 금지.

paths:
  # M5 원본 데이터 (프로젝트 루트 기준 상대 경로)
  m5_data_dir: "m5-forecasting-accuracy/"
  sell_prices: "m5-forecasting-accuracy/sell_prices.csv"
  calendar: "m5-forecasting-accuracy/calendar.csv"
  sales_train: "m5-forecasting-accuracy/sales_train_evaluation.csv"

  # 전처리 데이터
  processed_dir: "data/processed/"
  cold_start_dir: "data/processed/cold_start/"   # cold_start_data → cold_start 통일

  # 합성 페르소나
  personas_dir: "data/processed/personas/"

  # 실험 결과
  experiments_dir: "experiments/"

  # 로그
  log_dir: "logs/"

experiment:
  seed: 42

  # Cold-start 설정
  cold_start:
    n_cold_items: 100             # cold-start 아이템 수 (store-item 쌍 기준)
    target_store: "CA_1"          # cold-start를 시뮬레이션할 대상 매장
    sampling_level: "store_item"  # "store_item": id(item×store) 기준, "item": item_id 기준
    category_balance: true        # 카테고리 균형 샘플링 (FOODS/HOBBIES/HOUSEHOLD)
    tier_weights:                 # 판매량 티어별 샘플링 비율
      High: 0.25
      Medium: 0.50
      Low: 0.25
    # cross_store_info: 다른 매장의 동일 아이템 이력 참조 여부
    # false(기본): cold-start 아이템은 어느 매장 이력도 사용 불가
    # true(실험조건): target_store 외 매장의 이력은 warm data로 포함
    cross_store_info: false

  # 페르소나 설정
  personas:
    n_personas: 50                # Phase 1 feasibility test용
    store_id: "CA_1"              # 타겟 매장
    batch_size: 10                # 한 번에 생성할 페르소나 수 (다양성 확보)
    output_dir: "experiments/exp003_persona_generation"

  # LLM 설정
  llm:
    model: "gpt-4o"               # 페르소나 생성용
    prediction_model: "gpt-4o-mini"  # Track A 예측용 (비용 최적화)
    generation_temperature: 1.0   # 페르소나 생성: 다양성을 위해 높게
    prediction_temperature: 0.3   # 예측 추론: 일관성을 위해 낮게
    max_retries: 3

  # 베이스라인 설정
  baselines:
    # Similar Item Average (B2)에서 가격 유사도 기준
    price_tier_n_quantiles: 3          # Low / Medium / High (3분위)
    price_lookback_weeks: 13           # cold 아이템 가격 조회 기준: 직전 13주 평균
    # WRMSSE cold-start 스케일 처리
    wrmsse_scale: "category_warm_mean" # cold 아이템의 스케일 = 동일 카테고리 warm 아이템 평균
    # Direction Accuracy 집계 단위
    direction_agg: "weekly"            # "weekly" | "daily"
    # 실험 출력 경로
    output_dir: "experiments/exp002_cold_start_baselines"

  # Track A: Naive LLM 페르소나 예측 (GPT-4o-mini, 로컬 실행)
  track_a:
    output_dir: "experiments/exp004_track_a_naive"
    item_batch_size: 10           # 한 번 호출당 처리할 아이템 수
    condition: "A"                # A=Structured Only, B=Structured+Narrative, C=Narrative Only
    # 스케일 보정: 50명 합산 예측을 매장 전체 수준으로 환산
    # post-hoc 방식: alpha = mean(baseline_pred) / mean(track_a_raw)
    scale_align_method: "post_hoc_mean"  # "post_hoc_mean" | "none"

  # Track B: 2-Stage 임베딩 + 선형 회귀 헤드 (연구실 서버)
  # model_name 필드만 교체해 7B / 14B / 32B로 모두 실행 가능
  track_b:
    output_dir: "experiments/exp005_track_b_embedding"

    # ── 모델 선택 ──────────────────────────────────────────────────
    # 24GB GPU 2~3개 기본 목표 (model_name만 바꾸면 됨):
    #   7B  bfloat16 : ~14 GB  → GPU 1개  / batch_size 8 권장
    #   14B bfloat16 : ~28 GB  → GPU 2개  / batch_size 4 권장  ← 기본값
    #   32B bfloat16 : ~64 GB  → GPU 3개  / batch_size 2 권장
    #   14B 4-bit    : ~7  GB  → GPU 1개  / batch_size 8 권장
    #   32B 4-bit    : ~16 GB  → GPU 1개  / batch_size 4 권장
    model_name: "Qwen/Qwen2.5-14B-Instruct"

    # ── 임베딩 추출 설정 ───────────────────────────────────────────
    embedding_batch_size: 4       # GPU forward pass 배치 크기
    embedding_dtype: "bfloat16"   # 기본 파라미터 dtype ("bfloat16"|"float16"|"float32")
                                  # 양자화 사용 시 compute_dtype으로 별도 제어됨

    # ── 양자화 설정 (bitsandbytes) ────────────────────────────────
    # mode: "none"  → full precision (embedding_dtype 그대로 사용)
    #       "4bit"  → NF4 양자화 (VRAM 최대 절감, 속도 약간 저하)
    #       "8bit"  → LLM.int8() 양자화 (중간 타협점)
    quantization:
      mode: "none"                # "none" | "4bit" | "8bit"
      # 4-bit 전용 옵션 (mode="4bit"일 때만 적용)
      compute_dtype: "bfloat16"   # 실제 연산 dtype ("bfloat16" 권장)
      quant_type: "nf4"           # "nf4" | "fp4"
      double_quant: true          # 이중 양자화 (추가 메모리 절감 ~0.4bpp)

    # x_item = mean_pool([emb(persona_i, item) for i in 50 personas])
    n_personas_for_embedding: 50
    # 회귀 헤드 학습 설정
    n_warm_items_for_training: 300
    regression_alpha: 1.0         # Ridge 정규화 강도 (0이면 cross-validation 자동 선택)
    regression_cv_folds: 5

  # 평가 지표
  metrics:
    - mae
    - rmse
    - wrmsse
    - direction_accuracy
